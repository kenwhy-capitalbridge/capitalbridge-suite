# E2E: Forever → platform BACK + advisory save.
# Auth (pick one):
#   - secrets CB_E2E_EMAIL + CB_E2E_PASSWORD (preferred; fresh login each run)
#   - secret CB_E2E_STORAGE_JSON = full contents of e2e/.auth/storage.json
# Optional vars: CB_E2E_FOREVER_ORIGIN, CB_E2E_PLATFORM_ORIGIN (defaults to production hosts).
# Scheduled runs fail until the secret is set; disable the schedule in the workflow file if unused.
name: E2E model → platform

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 3"

concurrency:
  group: e2e-model-platform
  cancel-in-progress: false

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Bootstrap auth storage
        env:
          CB_E2E_EMAIL: ${{ secrets.CB_E2E_EMAIL }}
          CB_E2E_PASSWORD: ${{ secrets.CB_E2E_PASSWORD }}
          CB_E2E_STORAGE_JSON: ${{ secrets.CB_E2E_STORAGE_JSON }}
          CB_E2E_LOGIN_ORIGIN: https://login.thecapitalbridge.com
        run: node e2e/scripts/bootstrap-storage-state.cjs

      - name: Run Playwright
        env:
          CB_E2E_FOREVER_ORIGIN: ${{ vars.CB_E2E_FOREVER_ORIGIN }}
          CB_E2E_PLATFORM_ORIGIN: ${{ vars.CB_E2E_PLATFORM_ORIGIN }}
        run: npm run test:e2e

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Auth rotation hint
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          ## E2E auth may be expired

          If Playwright landed on `/access`, refresh auth:

          **Preferred (no manual rotation):** set repository secrets **`CB_E2E_EMAIL`** and **`CB_E2E_PASSWORD`** for the paid bot account. CI logs in headlessly before each run.

          **Manual fallback:**

          ```bash
          CB_E2E_LOGIN_ORIGIN=https://login.thecapitalbridge.com npm run e2e:storage
          gh secret set CB_E2E_STORAGE_JSON -R kenwhy-capitalbridge/capitalbridge-suite < e2e/.auth/storage.json
          ```

          See `e2e/README.md` for details.
          EOF
