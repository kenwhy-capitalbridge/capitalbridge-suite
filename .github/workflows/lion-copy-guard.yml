name: Lion Copy Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lion-copy-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Lion copy sync
        run: npm run lion:check-copy
