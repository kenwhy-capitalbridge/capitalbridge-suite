name: PDF Standard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pdf-standard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enforce Capital Bridge PDF STANDARD
        run: npm run verify:pdf-standard
