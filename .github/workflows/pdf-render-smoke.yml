# Exercises `renderPdf` + Playwright Chromium (same stack as Forever / Capital Stress `/api/.../report-pdf`).
name: PDF render smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  pdf-render-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate PDF via renderPdf
        run: npm run ci:pdf-render-smoke
